name: Deploy to AWS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: bash build.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          # HTML: short cache
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "public, max-age=300" \
            --content-type "text/html; charset=utf-8"

          # Vendor: long cache (immutable libraries)
          aws s3 sync dist/vendor/ s3://${{ secrets.S3_BUCKET }}/vendor/ \
            --cache-control "public, max-age=31536000, immutable"

          # CSV: medium cache
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.csv" \
            --cache-control "public, max-age=3600"

          # PWA assets
          aws s3 cp dist/manifest.json s3://${{ secrets.S3_BUCKET }}/manifest.json \
            --cache-control "public, max-age=3600"
          aws s3 cp dist/sw.js s3://${{ secrets.S3_BUCKET }}/sw.js \
            --cache-control "public, max-age=300"

          # Static assets
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.png" \
            --include "*.jpg" \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/sw.js" "/manifest.json"
