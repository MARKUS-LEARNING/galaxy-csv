<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' blob:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
        font-src https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self';
        worker-src blob:;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
        frame-ancestors 'none';
      ">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GALAXY ARTIFACT</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Space Mono', monospace; overflow: hidden; }

  /* Elegant thin scrollbars */
  * { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.15) transparent; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

  canvas { display: block; }

  #hud {
    position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none;
  }
  #hud h1 { font-size: 10px; letter-spacing: 5px; color: #333; text-transform: uppercase; }
  #hud .sub { font-size: 8px; letter-spacing: 2px; color: #666; margin-top: 2px; }

  #bottom-left {
    position: fixed; bottom: 20px; left: 20px; z-index: 10;
    display: flex; flex-direction: column; gap: 12px;
    pointer-events: none;
  }
  #bottom-left > * { pointer-events: auto; }
  #info {
    font-size: 10px; letter-spacing: 2px; color: #666;
    line-height: 1.9; pointer-events: none;
  }

  /* Navigation panel */
  #nav-panel {
    position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
    z-index: 12; display: flex; flex-direction: column; gap: 6px;
    align-items: center;
  }
  #nav-panel .nav-group {
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border: 1px solid #eee; border-radius: 6px;
    padding: 6px; display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  #nav-panel .nav-label {
    font-size: 7px; letter-spacing: 2px; text-transform: uppercase;
    color: #767676; margin-bottom: 2px; user-select: none;
  }
  #nav-panel .nav-btn {
    width: 28px; height: 28px; border: 1px solid #e0e0e0;
    border-radius: 4px; background: rgba(255,255,255,0.8);
    color: #666; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; padding: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  #nav-panel .nav-btn:hover { background: #f0f0f0; border-color: #bbb; color: #333; }
  #nav-panel .nav-btn:active { background: #222; color: #fff; border-color: #222; }
  #nav-panel .nav-btn.nav-home {
    width: 100%; height: 24px; font-size: 7px;
    letter-spacing: 2px; text-transform: uppercase;
    border-radius: 4px;
  }
  /* Mobile hamburger menu */
  #mobile-menu-btn {
    display: none; position: fixed; bottom: 20px; right: 20px; z-index: 25;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border: 1px solid #ddd; cursor: pointer;
    font-size: 18px; color: #555;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    font-family: inherit;
  }
  #mobile-menu-btn:active { background: #222; color: #fff; border-color: #222; }
  #mobile-menu {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    background: rgba(255,255,255,0.98); backdrop-filter: blur(16px);
    border-top: 1px solid #eee; border-radius: 16px 16px 0 0;
    max-height: 70vh; overflow-y: auto;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
    padding: env(safe-area-inset-bottom, 0px);
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  #mobile-menu.open { transform: translateY(0); }
  #mobile-menu .mm-tabs {
    display: flex; border-bottom: 1px solid #eee;
    position: sticky; top: 0; background: rgba(255,255,255,0.98);
    backdrop-filter: blur(16px); z-index: 1;
  }
  #mobile-menu .mm-tab {
    flex: 1; padding: 14px 8px; font-family: inherit; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: #999;
    background: none; border: none; cursor: pointer; text-align: center;
  }
  #mobile-menu .mm-tab.active { color: #222; border-bottom: 2px solid #222; }
  #mobile-menu .mm-panel { display: none; padding: 14px 16px; }
  #mobile-menu .mm-panel.active { display: block; }

  /* Screen reader announcements */
  #sr-announcer {
    position: absolute; width: 1px; height: 1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  /* Album Card (replaces tooltip) */
  #album-card {
    position: fixed; z-index: 20;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
    border: 1px solid #eee; padding: 20px 24px;
    font-size: 12px; letter-spacing: 1px; line-height: 1.9;
    color: #222; display: none;
    max-width: 380px; min-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    border-radius: 4px;
  }
  #album-card .ac-close {
    position: absolute; top: 8px; right: 12px;
    font-size: 18px; cursor: pointer; color: #767676;
    background: none; border: none; font-family: inherit;
    line-height: 1; padding: 2px 4px;
  }
  #album-card .ac-close:hover { color: #333; }
  #album-card .ac-name { font-weight: 700; font-size: 15px; letter-spacing: 2px; margin-bottom: 4px; padding-right: 20px; }
  #album-card .ac-sub { color: #555; font-size: 12px; margin-bottom: 6px; }
  #album-card .ac-genre {
    display: inline-block; padding: 3px 10px; border-radius: 3px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  #album-card .ac-links { display: flex; gap: 8px; flex-wrap: wrap; }
  #album-card .ac-link {
    display: inline-block; padding: 6px 14px; border-radius: 3px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    background: #222; color: #fff; text-decoration: none;
    font-family: inherit; transition: background 0.15s;
  }
  #album-card .ac-link:hover { background: #555; }
  #album-card .ac-link.ac-yt:hover { background: #cc0000; }
  #album-card .ac-link.ac-spotify:hover { background: #1db954; }
  #album-card .ac-link.ac-apple:hover { background: #fa243c; }
  #album-card .ac-link.ac-discogs:hover { background: #333; }
  #album-card .ac-link.ac-ebay:hover { background: #e53238; }

  /* Heart button on album card */
  #album-card .ac-heart {
    position: absolute; top: 8px; right: 38px;
    background: none; border: none; cursor: pointer;
    padding: 2px 4px; line-height: 1;
  }
  #album-card .ac-heart .heart-svg {
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #album-card .ac-heart .heart-path {
    fill: none;
    stroke: #ccc;
    stroke-width: 1.5;
    stroke-dasharray: 3 2;
    transition: fill 0.3s ease, stroke 0.3s ease, stroke-dasharray 0.3s ease;
  }
  #album-card .ac-heart:hover .heart-path {
    stroke: #e74c3c;
    stroke-dasharray: none;
  }
  #album-card .ac-heart.hearted .heart-path {
    fill: #e74c3c;
    stroke: #e74c3c;
    stroke-dasharray: none;
  }
  @keyframes heart-jump {
    0%   { transform: scale(1); }
    15%  { transform: scale(0.7); }
    30%  { transform: scale(1.3) rotate(-8deg); }
    45%  { transform: scale(0.95) rotate(4deg); }
    60%  { transform: scale(1.15) rotate(-2deg); }
    75%  { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  #album-card .ac-heart.jumping .heart-svg {
    animation: heart-jump 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #album-card.pinned { border-left: 3px solid #555; }

  /* Search bar — constrained between logo (left) and buttons (right) */
  #search-bar {
    position: fixed; top: 20px; left: 180px; right: 240px;
    z-index: 12; display: flex; align-items: center; gap: 0;
    max-width: 420px; margin: 0 auto;
  }
  #search-bar input {
    font-family: inherit; font-size: 12px; letter-spacing: 1px;
    padding: 7px 14px; width: 100%;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border: 1px solid #ddd; border-radius: 3px;
    color: #333; outline: none;
  }
  #search-bar input::placeholder { color: #767676; letter-spacing: 2px; font-size: 10px; }
  #search-bar input:focus { border-color: #999; background: rgba(255,255,255,0.97); }
  #search-count {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-family: inherit; font-size: 9px; letter-spacing: 1px;
    color: #aaa; pointer-events: none;
    opacity: 0; transition: opacity 0.2s ease;
  }
  #search-count.visible { opacity: 1; }
  #search-results {
    position: fixed; top: 52px; left: 180px; right: 240px;
    z-index: 11; max-width: 420px; margin: 0 auto; max-height: 60vh; overflow-y: auto;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
    border: 1px solid #eee; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    display: none;
  }
  #search-results.open { display: block; }
  .sr-item {
    padding: 8px 14px; cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
    transition: background 0.1s;
  }
  .sr-item:hover { background: #f8f8f8; }
  .sr-item:last-child { border-bottom: none; }
  .sr-name { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #222; }
  .sr-sub { font-size: 9px; letter-spacing: 1px; color: #666; margin-top: 2px; }
  .sr-match { background: rgba(231,76,60,0.12); padding: 0 2px; border-radius: 2px; }
  .sr-empty {
    padding: 16px 14px; text-align: center;
    font-size: 9px; letter-spacing: 1px; color: #767676;
  }
  .sr-hint {
    padding: 8px 14px; text-align: center;
    font-size: 8px; letter-spacing: 1px; color: #767676;
    border-top: 1px solid #f0f0f0;
  }

  /* Customize panel */
  #ctrl-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 12;
    font-family: inherit; font-size: 8px; letter-spacing: 3px;
    text-transform: uppercase; background: rgba(255,255,255,0.9);
    border: 1px solid #ddd; color: #555; padding: 5px 12px;
    cursor: pointer; backdrop-filter: blur(6px);
  }
  #ctrl-toggle:hover { border-color: #999; color: #222; }
  #ctrl-panel {
    position: fixed; top: 44px; right: 20px; z-index: 11;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border: 1px solid #eee; padding: 14px 16px;
    width: 220px; max-height: calc(100vh - 60px); overflow-y: auto;
    display: none; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }
  #ctrl-panel.open { display: block; }
  #ctrl-panel label {
    display: block; font-size: 7px; letter-spacing: 2px;
    text-transform: uppercase; color: #888; margin: 8px 0 3px;
  }
  #ctrl-panel label:first-child { margin-top: 0; }
  #ctrl-panel input[type=range] {
    width: 100%; border: none; padding: 0; margin: 2px 0; accent-color: #666;
  }
  #ctrl-panel .row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  #ctrl-panel .chip {
    font-family: inherit; font-size: 7px; letter-spacing: 1px;
    padding: 3px 8px; border: 1px solid #ddd; background: none;
    color: #666; cursor: pointer; text-transform: uppercase;
  }
  #ctrl-panel .chip:hover { border-color: #999; }
  #ctrl-panel .chip.on { background: #222; color: #fff; border-color: #222; }
  #ctrl-panel hr { border: none; border-top: 1px solid #f0f0f0; margin: 10px 0; }

  /* Filter/Sort panel */
  #filter-toggle {
    position: fixed; top: 20px; right: 130px; z-index: 12;
    font-family: inherit; font-size: 8px; letter-spacing: 3px;
    text-transform: uppercase; background: rgba(255,255,255,0.9);
    border: 1px solid #ddd; color: #555; padding: 5px 12px;
    cursor: pointer; backdrop-filter: blur(6px);
  }
  #filter-toggle:hover { border-color: #999; color: #222; }
  #filter-toggle.active { background: #222; color: #fff; border-color: #222; }
  #filter-panel {
    position: fixed; top: 44px; right: 130px; z-index: 11;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border: 1px solid #eee; padding: 14px 16px;
    width: 260px; max-height: calc(100vh - 60px); overflow-y: auto;
    display: none; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }
  #filter-panel.open { display: block; }
  #filter-panel label {
    display: block; font-size: 7px; letter-spacing: 2px;
    text-transform: uppercase; color: #888; margin: 8px 0 3px;
  }
  #filter-panel label:first-child { margin-top: 0; }
  #filter-panel select {
    font-family: inherit; font-size: 9px; letter-spacing: 1px;
    padding: 3px 6px; border: 1px solid #ddd; background: #fff;
    color: #555; flex: 1; width: 100%;
  }
  #filter-panel hr { border: none; border-top: 1px solid #f0f0f0; margin: 10px 0; }
  #filter-panel .row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  #filter-panel .chip {
    font-family: inherit; font-size: 7px; letter-spacing: 1px;
    padding: 3px 8px; border: 1px solid #ddd; background: none;
    color: #666; cursor: pointer; text-transform: uppercase;
  }
  #filter-panel .chip:hover { border-color: #999; }
  #filter-panel .chip.on { background: #222; color: #fff; border-color: #222; }
  .filter-section { margin-bottom: 4px; }
  .filter-section-header {
    font-family: inherit; font-size: 8px; letter-spacing: 1px;
    text-transform: uppercase; color: #666; cursor: pointer;
    background: none; border: none; padding: 4px 0; width: 100%;
    text-align: left; display: flex; justify-content: space-between;
  }
  .filter-section-header:hover { color: #222; }
  .filter-section-body {
    display: none; padding-left: 4px; max-height: 140px; overflow-y: auto;
  }
  .filter-section-body.open { display: block; }
  .filter-section-body label {
    display: flex !important; align-items: center; gap: 4px;
    font-size: 9px !important; letter-spacing: 0 !important;
    text-transform: none !important; color: #555 !important;
    margin: 2px 0 !important; cursor: pointer;
  }
  .filter-section-body input[type=checkbox] { accent-color: #555; }
  .filter-search {
    width: 100%; font-family: inherit; font-size: 8px;
    letter-spacing: 1px; padding: 3px 6px;
    border: 1px solid #eee; margin-bottom: 4px;
  }
  #filter-status {
    font-size: 8px; letter-spacing: 1px; color: #767676; margin-top: 6px;
  }

  /* Upload prompt (bottom-left) */
  #upload-bar .ub-link {
    font-family: inherit; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; color: #555; cursor: pointer;
    background: none; border: none; padding: 0;
    text-decoration: underline; text-underline-offset: 3px;
  }
  #upload-bar .ub-link:hover { color: #333; }
  #upload-bar input { display: none; }
  #upload-bar .ub-status {
    font-size: 8px; letter-spacing: 2px; color: #999;
    margin-top: 4px; display: none;
  }
  .ub-progress {
    width: 160px; height: 3px; background: #eee;
    margin-top: 6px; display: none; border-radius: 1px;
  }
  .ub-progress-fill {
    height: 100%; width: 0%; background: #555;
    border-radius: 1px; transition: width 0.15s;
  }

  /* Artifact Archive */
  #artifact-bag {
    position: relative;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border: 1px solid #eee; border-radius: 6px;
    width: 260px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
    transition: box-shadow 0.3s ease;
  }
  #artifact-bag:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  #artifact-bag .ab-toggle {
    font-family: inherit; font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; color: #333; cursor: pointer;
    background: none; border: none; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    width: 100%;
  }
  #artifact-bag .ab-toggle:hover { color: #e74c3c; }
  #artifact-bag .ab-icon {
    font-size: 18px; transition: transform 0.3s ease, color 0.3s ease;
  }
  #artifact-bag .ab-count {
    background: #e74c3c; color: #fff; font-size: 9px;
    padding: 1px 6px; border-radius: 8px; min-width: 18px;
    text-align: center; display: none;
  }
  #artifact-bag .ab-count.has-items { display: inline-block; }
  #artifact-bag .ab-chevron {
    margin-left: auto; font-size: 10px; color: #aaa;
    transition: transform 0.3s ease;
  }
  #artifact-bag.open .ab-chevron { transform: rotate(180deg); }
  #artifact-bag .ab-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #artifact-bag.open .ab-body {
    max-height: 400px;
  }
  #artifact-bag .ab-body-inner {
    padding: 0 14px 6px;
    max-height: 280px; overflow-y: auto;
  }
  #artifact-bag .ab-footer {
    display: flex; justify-content: flex-end; align-items: center;
    padding: 6px 14px 8px; border-top: 1px solid #f0f0f0;
  }
  #artifact-bag .ab-export {
    font-family: inherit; font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; padding: 4px 10px;
    background: #222; color: #fff; border: none; cursor: pointer;
    border-radius: 2px;
  }
  #artifact-bag .ab-export:hover { background: #555; }
  #artifact-bag .ab-item {
    display: flex; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #f5f5f5;
    font-size: 11px; letter-spacing: 0.5px; color: #333;
  }
  #artifact-bag .ab-item:last-child { border-bottom: none; }
  #artifact-bag .ab-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #artifact-bag .ab-item-artist { color: #999; font-size: 10px; margin-left: 6px; flex-shrink: 0; }
  #artifact-bag .ab-item-remove {
    background: none; border: none; color: #ccc; cursor: pointer;
    font-size: 14px; padding: 0 0 0 8px; font-family: inherit; flex-shrink: 0;
    line-height: 1;
  }
  #artifact-bag .ab-item-remove:hover { color: #e74c3c; }
  #artifact-bag .ab-empty {
    font-size: 10px; color: #bbb; letter-spacing: 1px;
    text-align: center; padding: 16px 0;
  }

  /* Swooping ghost animation */
  .swoop-ghost {
    position: fixed; z-index: 100;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700;
    letter-spacing: 2px; color: #e74c3c;
    pointer-events: none; white-space: nowrap;
  }

  /* Drag-and-drop overlay */
  body.drag-over::after {
    content: ''; position: fixed; inset: 12px; z-index: 50;
    border: 2px dashed #999; border-radius: 8px;
    background: rgba(255,255,255,0.04); pointer-events: none;
  }

  /* Loading overlay (shown only during initial load) */
  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 100; text-align: center;
    font-size: 9px; letter-spacing: 6px; color: #999; text-transform: uppercase;
  }
  #loading.hidden { display: none; }

  /* ─── Safe Area Insets ─── */
  #bottom-left { padding-bottom: env(safe-area-inset-bottom, 0px); padding-left: env(safe-area-inset-left, 0px); }
  #hud { padding-top: env(safe-area-inset-top, 0px); padding-left: env(safe-area-inset-left, 0px); }

  /* ─── Reduced Motion ─── */
  @media (prefers-reduced-motion: reduce) {
    .swoop-ghost, #album-card .ac-heart .heart-svg, #album-card .ac-heart.jumping .heart-svg { animation: none !important; transition: none !important; }
    #artifact-bag .ab-body { transition: none; }
    #mobile-menu { transition: none; }
  }

  /* ─── Tablet (769-1199px) ─── */
  @media (max-width: 1199px) {
    #search-bar { left: 160px; right: 220px; }
    #search-results { left: 160px; right: 220px; }
  }

  /* ─── Mobile (≤768px) ─── */
  @media (max-width: 768px) {
    /* Search bar: full-width */
    #search-bar { left: 12px; right: 12px; transform: none; width: auto; }
    #search-bar input { width: 100%; font-size: 14px; padding: 10px 60px 10px 14px; min-height: 44px; }
    #search-bar input::placeholder { font-size: 12px; }
    #search-count { font-size: 10px; right: 12px; }
    #search-results { left: 12px; right: 12px; transform: none; width: auto; top: 62px; max-height: 50vh; }
    .sr-item { padding: 12px 14px; min-height: 44px; }
    .sr-name { font-size: 13px; }
    .sr-sub { font-size: 11px; }

    /* Album card: bottom sheet */
    #album-card {
      position: fixed !important; left: 0 !important; right: 0 !important;
      bottom: 0 !important; top: auto !important;
      max-width: none; width: 100%;
      border-radius: 16px 16px 0 0; max-height: 50vh;
      overflow-y: auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
    }
    #album-card .ac-name { font-size: 16px; }

function applyFilters(rows) {
  const cols = Object.keys(activeFilters);
  if (!cols.length) return rows;
  return rows.filter(row => cols.every(col => {
    const allowed = activeFilters[col];
    if (!allowed || allowed.size === 0) return true;
    return allowed.has((row[col] || '').toString());
  }));
}

function applySort(rows) {
  if (!activeSortCol) return rows;
  const col = activeSortCol, dir = activeSortDir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    const va = (a[col] || ''), vb = (b[col] || '');
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    return va.localeCompare(vb) * dir;
  });
}

function loadArtifactArchive() {
  try {
    const raw = localStorage.getItem('artifactArchive');

    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    // Cap at 10K entries and validate shape
    return parsed.slice(0, 10000).filter(a => a && typeof a === 'object' && typeof a.key === 'string');
  } catch { return []; }
}

function getArtifactKey(entry) {
  const r = entry.row;
  const name = r[entry.nameCol] || '';
  const artist = (entry.artistCol && r[entry.artistCol]) || '';
  const album = (entry.albumCol && r[entry.albumCol]) || '';
  return name + '|||' + artist + '|||' + album;
}

function isHearted(entry) {
  const key = getArtifactKey(entry);

}

  const bag = document.getElementById('ab-toggle');

  ghost.className = 'swoop-ghost';
  ghost.textContent = nameText;
  ghost.style.left = startRect.left + 'px';
  ghost.style.top = startRect.top + 'px';
  document.body.appendChild(ghost);

  const dx = bagRect.left + bagRect.width / 2 - startRect.left;
  const dy = bagRect.top + bagRect.height / 2 - startRect.top;

  ghost.animate([
    { opacity: 1, transform: 'scale(1) translate(0, 0)', offset: 0 },
    { opacity: 1, transform: 'scale(1.15) translate(0, -15px)', offset: 0.2 },
    { opacity: 0.6, transform: 'scale(0.4) translate(' + dx + 'px, ' + dy + 'px)', offset: 1 }
  ], {
    duration: 700,
    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    fill: 'forwards'
  });

  setTimeout(() => {
    ghost.remove();
    const icon = document.querySelector('#artifact-bag .ab-icon');
    icon.style.transform = 'scale(1.5)';
    icon.style.color = '#e74c3c';

function csvSplitRows(t){const r=[];let c='',q=false;for(let i=0;i<t.length;i++){const ch=t[i];if(ch==='"'){q=!q;c+=ch}else if(ch==='\n'&&!q){r.push(c);c=''}else c+=ch}if(c.trim())r.push(c);return r}
function csvSplitFields(l){const f=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){f.push(c);c=''}else c+=ch}f.push(c);return f}
function parseCSV(text){
  const n=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const raw=csvSplitRows(n);if(raw.length<2)return{headers:[],rows:[]};
  const tsv=raw[0].includes('\t');
  const p=tsv?l=>l.split('\t').map(v=>v.trim().replace(/^"|"$/g,'')):csvSplitFields;
  const h=p(raw[0]),rows=[];
  for(let i=1;i<raw.length;i++){if(!raw[i].trim())continue;const v=p(raw[i]);
    if(v.length>=h.length-5&&v.length<=h.length+2){const r={};h.forEach((k,j)=>r[k]=(v[j]||'').trim());rows.push(r)}}
  return{headers:h,rows};
}
function sample(rows){if(rows.length<=MAX_PTS)return rows;const s=rows.length/MAX_PTS,o=[];for(let i=0;i<rows.length&&o.length<MAX_PTS;i+=s)o.push(rows[Math.floor(i)]);return o}

// ─── CSV Web Worker (inline via Blob URL) ───
const _workerCode = `
  ${csvSplitRows.toString()}
  ${csvSplitFields.toString()}
  ${parseCSV.toString()}
  const MAX_PTS = ${MAX_PTS};
  ${sample.toString()}
  self.onmessage = function(e) {
    try {
      self.postMessage({ type: 'progress', phase: 'parsing', pct: 55 });
      const result = parseCSV(e.data);
      self.postMessage({ type: 'progress', phase: 'sampling', pct: 80 });
      const sampled = sample(result.rows);
      self.postMessage({ type: 'done', headers: result.headers, rows: sampled, totalRows: result.rows.length });
    } catch (err) {
      self.postMessage({ type: 'error', message: err.message });
    }
  };
`;
const _workerBlob = new Blob([_workerCode], { type: 'application/javascript' });
const _workerUrl = URL.createObjectURL(_workerBlob);

// ─── XML Parser ───

// Apple Music / iTunes plist XML parser
function parsePlistDict(dictEl) {
  const obj = {};
  const children = dictEl.children;
  for (let i = 0; i < children.length - 1; i++) {
    if (children[i].tagName === 'key') {
      const key = children[i].textContent;
      const val = children[i + 1];
      const tag = val.tagName;
      if (tag === 'string' || tag === 'integer' || tag === 'real') {
        obj[key] = val.textContent;
      } else if (tag === 'true') {
        obj[key] = 'true';
      } else if (tag === 'false') {
        obj[key] = 'false';
      } else if (tag === 'date') {
        obj[key] = val.textContent;
      }
      // skip nested dict/array values (playlists, etc.)
      i++; // advance past value
    }
  }
  return obj;
}

function parsePlistTracks(doc) {
  // Structure: <plist><dict> ... <key>Tracks</key><dict> <key>ID</key><dict>track</dict> ... </dict>
  const root = doc.documentElement; // <plist>
  const topDict = root.querySelector(':scope > dict');
  if (!topDict) return null;

  // Find the "Tracks" dict
  let tracksDict = null;
  const topChildren = topDict.children;
  for (let i = 0; i < topChildren.length - 1; i++) {
    if (topChildren[i].tagName === 'key' && topChildren[i].textContent === 'Tracks') {
      const next = topChildren[i + 1];
      if (next.tagName === 'dict') tracksDict = next;
      break;
    }
  }
  if (!tracksDict) return null;

  // Each track: <key>ID</key><dict>...</dict>
  const rows = [];
  const headerSet = new Set();
  const trackChildren = tracksDict.children;
  for (let i = 0; i < trackChildren.length - 1; i++) {
    if (trackChildren[i].tagName === 'key') {
      const next = trackChildren[i + 1];
      if (next.tagName === 'dict') {
        const track = parsePlistDict(next);
        for (const k of Object.keys(track)) headerSet.add(k);
        rows.push(track);
      }
      i++; // advance past value
    }
  }
  if (!rows.length) return null;

  // Prioritize useful columns for the visualizer
  const priority = ['Name', 'Artist', 'Album', 'Genre', 'Year', 'Total Time', 'Track Number', 'Play Count', 'Date Added'];
  const rest = [...headerSet].filter(h => !priority.includes(h)).sort();
  const headers = [...priority.filter(h => headerSet.has(h)), ...rest];

  return { headers, rows };
}

function parseXML(text) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'application/xml');
  if (doc.querySelector('parsererror')) return { headers: [], rows: [] };

  // Detect Apple Music / iTunes plist format
  if (doc.documentElement.tagName === 'plist') {
    const result = parsePlistTracks(doc);
    if (result) return result;
  }

  // Generic XML: find repeating record elements
  const root = doc.documentElement;
  let records = [];
  // Try direct children first
  const childTags = {};
  for (const child of root.children) {
    childTags[child.tagName] = (childTags[child.tagName] || 0) + 1;
  }
  const mostCommonTag = Object.entries(childTags).sort((a, b) => b[1] - a[1])[0];
  if (mostCommonTag && mostCommonTag[1] > 1) {
    records = [...root.querySelectorAll(`:scope > ${mostCommonTag[0]}`)];
  } else {
    // Try one level deeper (e.g., <root><items><item>...)
    for (const wrapper of root.children) {
      const innerTags = {};
      for (const child of wrapper.children) {
        innerTags[child.tagName] = (innerTags[child.tagName] || 0) + 1;
      }
      const inner = Object.entries(innerTags).sort((a, b) => b[1] - a[1])[0];
      if (inner && inner[1] > 1) {
        records = [...wrapper.querySelectorAll(`:scope > ${inner[0]}`)];
        break;
      }
    }
  }
  if (!records.length) return { headers: [], rows: [] };

  // Extract headers from first record's child element names + attributes
  const headerSet = new Set();
  records.slice(0, 20).forEach(rec => {
    for (const attr of rec.attributes) headerSet.add(`@${attr.name}`);
    for (const child of rec.children) headerSet.add(child.tagName);
  });
  const headers = [...headerSet];

  const rows = records.map(rec => {
    const row = {};
    for (const h of headers) {
      if (h.startsWith('@')) {
        row[h] = rec.getAttribute(h.slice(1)) || '';
      } else {
        const el = rec.querySelector(`:scope > ${h}`);
        row[h] = el ? el.textContent.trim() : '';
      }
    }
    return row;
  });

  return { headers, rows };
}

function isXML(text) {
  return text.trimStart().startsWith('<?xml') || text.trimStart().startsWith('<');
}

// ─── Safe URL builder ───
function buildYouTubeSearchUrl(song, artist) {
  const query = [artist, song].filter(Boolean).join(' ');
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query);
}
function buildSpotifySearchUrl(song, artist) {
  const query = [artist, song].filter(Boolean).join(' ');
  return 'https://open.spotify.com/search/' + encodeURIComponent(query);
}
function buildAppleMusicSearchUrl(song, artist) {
  const query = [artist, song].filter(Boolean).join(' ');
  return 'https://music.apple.com/us/search?term=' + encodeURIComponent(query);
}
function buildDiscogsSearchUrl(song, artist) {
  const query = [artist, song].filter(Boolean).join(' ');
  return 'https://www.discogs.com/search/?q=' + encodeURIComponent(query) + '&type=all';
}
function buildEbaySearchUrl(song, artist) {
  const query = [artist, song].filter(Boolean).join(' ') + ' vinyl';
  return 'https://www.ebay.com/sch/i.html?_nkw=' + encodeURIComponent(query);
}

function safeHref(url) {
  try {
    const parsed = new URL(url);
    if (parsed.protocol !== 'https:' && parsed.protocol !== 'http:') return '#';
    return url;
  } catch { return '#'; }
}

// ─── File validation ───
const MAX_FILE_SIZE_BYTES = 200 * 1024 * 1024;
const ALLOWED_EXTENSIONS = ['.csv', '.tsv', '.txt', '.xml'];

function validateFile(file) {
  if (!file) return 'No file provided.';
  const ext = file.name.slice(file.name.lastIndexOf('.')).toLowerCase();
  if (!ALLOWED_EXTENSIONS.includes(ext)) return `Invalid file type. Please upload a .csv or .xml file. Got: ${ext}`;
  if (file.size > MAX_FILE_SIZE_BYTES) return `File too large (${(file.size / 1024 / 1024).toFixed(1)} MB). Maximum is 200 MB.`;
  if (file.size === 0) return 'File is empty.';
  return null;
}

// ─── Find columns ───
function findCol(hdrs, kws) {
  return hdrs.find(h => kws.some(k => h.toLowerCase() === k))
    || hdrs.find(h => kws.some(k => h.toLowerCase().includes(k)));
}

  composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.15,0.4,0.92);
  composer.addPass(bloomPass);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.06;

  controls.rotateSpeed=0.4;controls.zoomSpeed=0.6;controls.panSpeed=0.5;
  controls.autoRotateSpeed=0.3;
  scene.add(new THREE.AmbientLight(0xffffff,1.0));
  const d=new THREE.DirectionalLight(0xffffff,0.6);d.position.set(50,80,50);scene.add(d);
  raycaster=new THREE.Raycaster();clock=new THREE.Clock();
  // ResizeObserver for smooth resize handling (avoids iOS Safari address bar jank)
  if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => {
      camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
    });
    ro.observe(document.body);
  } else {
    window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});
  }
  renderer.domElement.setAttribute('role', 'application');
  renderer.domElement.setAttribute('aria-label', 'Galaxy Artifact 3D visualization');
  renderer.domElement.addEventListener('click',onClick);
  renderer.domElement.addEventListener('pointermove',onCursorHint);
  window.addEventListener('keydown',onKey);window.addEventListener('keyup',onKeyUp);

    document.getElementById('t-autofly')?.classList.remove('on');
    document.getElementById('t-wave')?.classList.remove('on');
  }
}

// ─── Build ───
function build(hdrs, rows){
  headers=hdrs; csvData=rows;

  // Find key columns
  const yearCol = findCol(hdrs, ['year']);
  const genreCol = findCol(hdrs, ['genre','type','category','style']);
  const nameCol = findCol(hdrs, ['name','title','song','track']) || hdrs[0];
  const artistCol = findCol(hdrs, ['artist','band']);
  const albumCol = findCol(hdrs, ['album','release']);
  const timeCol = findCol(hdrs, ['time','duration','length']);

  // ─── Genre bucketing: top N + Other ───
  const genreFreq = {};
  rows.forEach(r => { const g = (genreCol ? r[genreCol] : '') || ''; genreFreq[g] = (genreFreq[g]||0)+1; });
  const sortedGenres = Object.entries(genreFreq).sort((a,b) => b[1]-a[1]);
  const topGenres = sortedGenres.slice(0, MAX_GENRES).map(e => e[0]);
  const genreSet = new Set(topGenres);

  // Assign colors
  colorMap = {};
  const pal = PALETTES[activePalette] || PALETTES.phantom;
  topGenres.forEach((g,i) => { colorMap[g] = pal[i % pal.length]; });

  function getGenreBucket(row) {
    const g = genreCol ? row[genreCol] : '';
    return genreSet.has(g) ? g : '_other_';
  }

  // ─── Year range (numeric X axis) ───
  let years = [];
  if (yearCol) {
    rows.forEach(r => { const y = parseInt(r[yearCol]); if (y > 1900 && y <= 2030) years.push(y); });
  }
  const minYear = years.length ? Math.min(...years.slice(0,10000)) : 1960;
  const maxYear = years.length ? Math.max(...years.slice(0,10000)) : 2025;
  const yearRange = maxYear - minYear || 1;

  // ─── Layout constants ───
  const X_SPREAD = 150;  // year timeline width
  const Y_GAP = 8;       // vertical gap between genre rows
  const Z_SCATTER = FLY_DEPTH; // depth scatter (was 5)
  const SPHERE_RADIUS = 80;
  const HELIX_RADIUS = 25;
  const HELIX_PITCH = 0.6;

  // Genre row positions (top genres evenly spaced, Other at bottom)
  const genreY = {};
  const allBuckets = [...topGenres, '_other_'];
  allBuckets.forEach((g,i) => { genreY[g] = (allBuckets.length/2 - i) * Y_GAP; });

  // Sphere layout: latitude band per genre
  const genreLat = {};
  allBuckets.forEach((g, i) => {
    genreLat[g] = (0.5 - i / (allBuckets.length - 1 || 1)) * 160 * (Math.PI / 180);
  });

  // ─── Clear old ───
  instanceGroups.forEach(g => {
    // Don't dispose cached geometry — only material and InstancedMesh buffers
    g.mesh.material.dispose();
    g.mesh.dispose();
    scene.remove(g.mesh);
    g.data = null;
  });
  labelSprites.forEach(s => { s.material.map?.dispose(); s.material.dispose(); scene.remove(s); });
  instanceGroups=[]; allData=[]; labelSprites=[]; pinnedInstance=null; selectedCard=null; unpinning=null;
  flyOffset = 0;

  // ─── Group rows by (genre bucket, shapeIdx) ───
  const groups = {}; // key: `${bucket}|${shapeIdx}`
  rows.forEach((row,i) => {
    const bucket = getGenreBucket(row);
    const shapeIdx = i % NUM_SHAPES;
    const key = `${bucket}|${shapeIdx}`;
    if (!groups[key]) groups[key] = { bucket, shapeIdx, items: [] };
    groups[key].items.push({ row, idx: i });
  });

  const dummy = new THREE.Object3D();
  const centroid = new THREE.Vector3();
  let total = 0;
  let groupCounter = 0;

  Object.values(groups).forEach(group => {
    const { bucket, shapeIdx, items } = group;
    if (!items.length) return;

    const color = new THREE.Color(colorMap[bucket] || OTHER);
    const isOther = bucket === '_other_';
    const mat = new THREE.MeshPhysicalMaterial({
      color, metalness: 0.3, roughness: 0.35,
      emissive: color, emissiveIntensity: isOther ? 0.5 : 0.7,
      transparent: false, opacity: 1.0,
    });

    const geom = getCachedGeometry(shapeIdx);
    const im = new THREE.InstancedMesh(geom, mat, items.length);
    im.userData.groupIdx = groupCounter;
    im.userData.bucket = bucket;

    const gData = [];
    items.forEach((item, li) => {
      let x, y, z;

      // Year normalization helper
      let yearNorm = item.idx / rows.length; // fallback
      if (yearCol) {
        const yr = parseInt(item.row[yearCol]);
        if (yr > 1900 && yr <= 2030) yearNorm = (yr - minYear) / yearRange;
      }
      const bucketIdx = allBuckets.indexOf(bucket);
      const bucketFrac = bucketIdx / (allBuckets.length - 1 || 1);

      if (layoutMode === 'sphere') {
        const latSpread = (160 / (allBuckets.length || 1)) * (Math.PI / 180);
        const lat = genreLat[bucket] + (Math.random() - 0.5) * latSpread;
        const lon = yearNorm * Math.PI * 2 + (Math.random() - 0.5) * 0.15;
        const r = SPHERE_RADIUS + (Math.random() - 0.5) * 10;
        x = r * Math.cos(lat) * Math.cos(lon);
        y = r * Math.sin(lat);
        z = r * Math.cos(lat) * Math.sin(lon);

      } else if (layoutMode === 'helix') {
        // DNA double helix — two intertwined strands
        const strand = li % 2; // alternate items between strands
        const theta = yearNorm * Math.PI * 12 + (Math.random() - 0.5) * 0.2;
        const helixY = (yearNorm - 0.5) * 120;
        const strandOffset = strand * Math.PI; // 180° apart
        const rJitter = HELIX_RADIUS + (Math.random() - 0.5) * 4;
        x = rJitter * Math.cos(theta + strandOffset);
        z = rJitter * Math.sin(theta + strandOffset);
        y = helixY + (Math.random() - 0.5) * 2;

      } else if (layoutMode === 'grid') {
        // Clean organized grid — rows by genre, columns by year
        const cols = Math.max(Math.ceil(Math.sqrt(rows.length / allBuckets.length)), 4);
        const colIdx = Math.floor(yearNorm * (cols - 1));
        const gridSpacing = 3.5;
        x = (colIdx - cols / 2) * gridSpacing + (Math.random() - 0.5) * 0.6;
        y = (allBuckets.length / 2 - bucketIdx) * gridSpacing * 1.8;
        z = (Math.random() - 0.5) * 2;

      } else if (layoutMode === 'schotter') {
        // Georg Nees' Schotter — order dissolves into chaos
        const cols = Math.max(Math.ceil(Math.sqrt(rows.length / allBuckets.length)), 6);
        const colIdx = Math.floor(yearNorm * (cols - 1));
        const gridSp = 3.2;
        const rowIdx = allBuckets.length - 1 - bucketIdx;
        const chaos = rowIdx / (allBuckets.length - 1 || 1); // 0=top(ordered), 1=bottom(chaotic)
        const chaosAmt = chaos * chaos; // quadratic ramp
        x = (colIdx - cols / 2) * gridSp + (Math.random() - 0.5) * chaosAmt * gridSp * 1.8;
        y = (allBuckets.length / 2 - bucketIdx) * gridSp * 1.6 + (Math.random() - 0.5) * chaosAmt * gridSp * 1.5;
        z = (Math.random() - 0.5) * chaosAmt * 12;

      } else if (layoutMode === 'oscillons') {
        // Laposky's oscilloscope — Lissajous curves from sine generators
        const curveIdx = bucketIdx % 4;
        const freqPairs = [[3,2],[5,4],[7,6],[5,3]];
        const [fA, fB] = freqPairs[curveIdx];
        const phaseOff = (bucketIdx / (allBuckets.length || 1)) * Math.PI;
        const theta = yearNorm * Math.PI * 2 * 3; // 3 full loops
        const r = 35 + bucketIdx * 3;
        x = r * Math.sin(fA * theta + phaseOff);
        y = r * Math.cos(fB * theta);
        z = 15 * Math.sin(theta * 2 + phaseOff) + (Math.random() - 0.5) * 4;
        x += (Math.random() - 0.5) * 3;
        y += (Math.random() - 0.5) * 3;

      } else if (layoutMode === 'mobiles') {
        // Pask's Colloquy of Mobiles — hanging kinetic sculpture
        const branchAngle = (bucketIdx / (allBuckets.length || 1)) * Math.PI * 2;
        const armLen = 30 + bucketIdx * 5;
        const branchX = armLen * Math.cos(branchAngle);
        const branchZ = armLen * Math.sin(branchAngle);
        const hangDepth = -yearNorm * 60 - Math.random() * 10;
        const swing = Math.sin(yearNorm * Math.PI * 4 + bucketIdx) * 5;
        x = branchX + swing + (Math.random() - 0.5) * 8;
        y = hangDepth;
        z = branchZ + (Math.random() - 0.5) * 8;

      } else if (layoutMode === 'stream') {
        // Flowing river — genre streams that weave and converge
        const streamX = (yearNorm - 0.5) * X_SPREAD;
        const streamPhase = bucketFrac * Math.PI * 2;
        const meander = Math.sin(yearNorm * Math.PI * 3 + streamPhase) * 12;
        const streamY = (allBuckets.length / 2 - bucketIdx) * 5 + meander;
        const depth = Math.sin(yearNorm * Math.PI * 5 + streamPhase * 0.7) * 8;
        x = streamX + (Math.random() - 0.5) * 3;
        y = streamY + (Math.random() - 0.5) * 2;
        z = depth + (Math.random() - 0.5) * 4;

      } else {
        // Layers (default)
        x = (yearNorm - 0.5) * X_SPREAD;
        if (yearCol) {
          const yr = parseInt(item.row[yearCol]);
          if (!(yr > 1900 && yr <= 2030)) x = (Math.random() - 0.5) * 10 - X_SPREAD/2 - 10;
        }
        y = genreY[bucket] + (Math.random() - 0.5) * Y_GAP * 0.5;
        z = (Math.random() - 0.5) * Z_SCATTER;
      }

      const s = isOther ? 0.5 : 0.65 + Math.random() * 0.35;
      dummy.position.set(x, y, z);
      dummy.scale.set(s, s, s);
      if (layoutMode === 'schotter') {
        // Nees-style: rotation increases with row (order → chaos)
        const rowIdx = allBuckets.length - 1 - bucketIdx;
        const chaos = (rowIdx / (allBuckets.length - 1 || 1));
        const chaosAmt = chaos * chaos;
        dummy.rotation.set(
          (Math.random() - 0.5) * chaosAmt * Math.PI,
          (Math.random() - 0.5) * chaosAmt * Math.PI * 0.5,
          (Math.random() - 0.5) * chaosAmt * Math.PI
        );
      } else {
        dummy.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
      }
      dummy.updateMatrix();
      im.setMatrixAt(li, dummy.matrix);

      // Per-instance animation params
      const phase = Math.random() * Math.PI * 2;
      const freq = 0.3 + Math.random() * 0.5;
      const amp = 0.2 + Math.random() * 0.4;

      const bp = new THREE.Vector3(x, y, z);
      centroid.add(bp); total++;
      gData.push({ row: item.row, idx: item.idx, localIdx: li, basePos: bp, baseScale: s,
        nameCol, artistCol, albumCol, genreCol, yearCol,
        phase, freq, amp });
    });

    im.instanceMatrix.needsUpdate = true;
    scene.add(im);
    instanceGroups.push({ mesh: im, data: gData, bucket });
    groupCounter++;
  });

  centroid.divideScalar(total || 1);

  // ─── Labels ───
  if (showLabels) {
    if (layoutMode === 'sphere') {
      allBuckets.forEach(bucket => {
        if (bucket === '_other_') return;
        const lat = genreLat[bucket];
        const labelR = SPHERE_RADIUS + 15;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(labelR * Math.cos(lat), labelR * Math.sin(lat), 0);
        scene.add(sprite); labelSprites.push(sprite);
      });
      const yearStep = yearRange > 30 ? 10 : 5;
      for (let yr = Math.ceil(minYear/yearStep)*yearStep; yr <= maxYear; yr += yearStep) {
        const lon = ((yr - minYear) / yearRange) * Math.PI * 2;
        const labelR = SPHERE_RADIUS + 12;
        const sprite = makeLabel(String(yr), '#bbb');
        sprite.position.set(labelR * Math.cos(lon), -2, labelR * Math.sin(lon));
        sprite.scale.set(8, 1.5, 1);
        scene.add(sprite); labelSprites.push(sprite);
      }

    } else if (layoutMode === 'helix') {
      // Year markers along the helix axis
      const yearStep = yearRange > 30 ? 10 : 5;
      for (let yr = Math.ceil(minYear/yearStep)*yearStep; yr <= maxYear; yr += yearStep) {
        const yNorm = (yr - minYear) / yearRange;
        const sprite = makeLabel(String(yr), '#bbb');
        sprite.position.set(HELIX_RADIUS + 8, (yNorm - 0.5) * 120, 0);
        sprite.scale.set(8, 1.5, 1);
        scene.add(sprite); labelSprites.push(sprite);
      }

    } else if (layoutMode === 'grid') {
      // Genre labels along left edge
      const gridSpacing = 3.5;
      const cols = Math.max(Math.ceil(Math.sqrt(rows.length / allBuckets.length)), 4);
      allBuckets.forEach((bucket, i) => {
        if (bucket === '_other_') return;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(-cols / 2 * gridSpacing - 10, (allBuckets.length / 2 - i) * gridSpacing * 1.8, 0);
        scene.add(sprite); labelSprites.push(sprite);
      });

    } else if (layoutMode === 'schotter') {
      // Genre labels along left edge, Nees-style
      const gridSp = 3.2;
      const cols = Math.max(Math.ceil(Math.sqrt(rows.length / allBuckets.length)), 6);
      allBuckets.forEach((bucket, i) => {
        if (bucket === '_other_') return;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(-cols / 2 * gridSp - 10, (allBuckets.length / 2 - i) * gridSp * 1.6, 0);
        scene.add(sprite); labelSprites.push(sprite);
      });

    } else if (layoutMode === 'oscillons') {
      // Genre labels near their Lissajous curves
      allBuckets.forEach((bucket, i) => {
        if (bucket === '_other_') return;
        const curveIdx = i % 4;
        const freqPairs = [[3,2],[5,4],[7,6],[5,3]];
        const [fA, fB] = freqPairs[curveIdx];
        const phaseOff = (i / (allBuckets.length || 1)) * Math.PI;
        const r = 35 + i * 3;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(r * Math.sin(fA * 0.3 + phaseOff) + r * 0.3, r * Math.cos(fB * 0.3) + 5, 0);
        scene.add(sprite); labelSprites.push(sprite);
      });

    } else if (layoutMode === 'mobiles') {
      // Genre labels at branch origins
      allBuckets.forEach((bucket, i) => {
        if (bucket === '_other_') return;
        const branchAngle = (i / (allBuckets.length || 1)) * Math.PI * 2;
        const armLen = 30 + i * 5;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(armLen * Math.cos(branchAngle), 5, armLen * Math.sin(branchAngle));
        scene.add(sprite); labelSprites.push(sprite);
      });

    } else if (layoutMode === 'stream') {
      // Genre labels at the start of each stream
      allBuckets.forEach((bucket, i) => {
        if (bucket === '_other_') return;
        const streamPhase = (i / (allBuckets.length - 1 || 1)) * Math.PI * 2;
        const meander = Math.sin(streamPhase) * 12;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(-X_SPREAD / 2 - 14, (allBuckets.length / 2 - i) * 5 + meander, 0);
        scene.add(sprite); labelSprites.push(sprite);
      });
      const yearStep = yearRange > 30 ? 10 : 5;
      for (let yr = Math.ceil(minYear/yearStep)*yearStep; yr <= maxYear; yr += yearStep) {
        const xPos = ((yr - minYear) / yearRange - 0.5) * X_SPREAD;
        const sprite = makeLabel(String(yr), '#bbb');
        sprite.position.set(xPos, -allBuckets.length * 2.5 - 8, 0);
        sprite.scale.set(8, 1.5, 1);
        scene.add(sprite); labelSprites.push(sprite);
      }

    } else {
      // Layers (default)
      allBuckets.forEach(bucket => {
        if (bucket === '_other_') return;
        const sprite = makeLabel(bucket, colorMap[bucket] || OTHER);
        sprite.position.set(-X_SPREAD/2 - 14, genreY[bucket], 0);
        scene.add(sprite); labelSprites.push(sprite);
      });
      if (groups[Object.keys(groups).find(k => k.startsWith('_other_'))]) {
        const sprite = makeLabel(`Other (${sortedGenres.length - MAX_GENRES} genres)`, OTHER);
        sprite.position.set(-X_SPREAD/2 - 14, genreY['_other_'], 0);
        scene.add(sprite); labelSprites.push(sprite);
      }
      const yearStep = yearRange > 30 ? 10 : 5;
      for (let y = Math.ceil(minYear/yearStep)*yearStep; y <= maxYear; y += yearStep) {
        const xPos = ((y - minYear) / yearRange - 0.5) * X_SPREAD;
        const sprite = makeLabel(String(y), '#bbb');
        sprite.position.set(xPos, genreY['_other_'] - Y_GAP, 0);
        sprite.scale.set(8, 1.5, 1);
        scene.add(sprite); labelSprites.push(sprite);
      }
    }
  }

  // Camera
  if (layoutMode === 'sphere') {
    controls.target.set(0, 0, 0);
    camera.position.set(0, SPHERE_RADIUS * 0.5, SPHERE_RADIUS * 2.2);
  } else if (layoutMode === 'helix') {
    controls.target.set(0, 0, 0);
    camera.position.set(60, 20, 60);
  } else if (layoutMode === 'grid') {
    controls.target.copy(centroid);
    camera.position.set(centroid.x, centroid.y + 30, centroid.z + 60);
  } else if (layoutMode === 'schotter') {
    controls.target.copy(centroid);
    camera.position.set(centroid.x, centroid.y + 20, centroid.z + 55);
  } else if (layoutMode === 'oscillons') {
    controls.target.set(0, 0, 0);
    camera.position.set(0, 20, 120);
  } else if (layoutMode === 'mobiles') {
    controls.target.set(0, -25, 0);
    camera.position.set(80, 15, 80);
  } else if (layoutMode === 'stream') {
    controls.target.copy(centroid);
    camera.position.set(centroid.x, centroid.y + 20, centroid.z + X_SPREAD * 0.4);
  } else {
    controls.target.copy(centroid);
    camera.position.set(centroid.x, centroid.y + 10, centroid.z + X_SPREAD * 0.5);
  }
  controls.update();

  // HUD
  const ct = totalRows > rows.length ? `${rows.length.toLocaleString()} of ${totalRows.toLocaleString()}` : rows.length.toLocaleString();
  document.getElementById('hud-sub').textContent = `${ct} tracks`;
  const infoEl = document.getElementById('info');
  infoEl.textContent = '';
  const infoLines = layoutMode === 'sphere'
    ? [
        yearCol ? `\u27F3 ${minYear} \u2014 ${yearCol} \u2014 ${maxYear} (longitude)` : '',
        genreCol ? `\u2195 ${genreCol} (latitude, top ${topGenres.length})` : '',
        'scroll zoom \u00b7 drag orbit \u00b7 click to inspect',
      ].filter(Boolean)
    : [
        yearCol ? `\u2190 ${minYear} \u2500\u2500\u2500 ${yearCol} \u2500\u2500\u2500 ${maxYear} \u2192` : '',
        genreCol ? `\u2195 ${genreCol} (top ${topGenres.length})` : '',
        'scroll zoom \u00b7 drag orbit \u00b7 click to inspect',
      ].filter(Boolean);
  infoLines.forEach((line, i) => {
    if (i > 0) infoEl.appendChild(document.createElement('br'));
    infoEl.appendChild(document.createTextNode(line));
  });
}

function makeLabel(text, color){
  const c = document.createElement('canvas');
  c.width=512;c.height=64;
  const ctx=c.getContext('2d');
  ctx.font='500 28px Space Mono, monospace';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillStyle=color||'#999';ctx.globalAlpha=0.85;
  ctx.fillText(text.length>26?text.slice(0,26)+'..':text,8,32);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.7,depthWrite:false});
  const s=new THREE.Sprite(mat);s.scale.set(12,1.5,1);return s;
}

// ─── Floating Animation ───
const _floatDummy = new THREE.Object3D();
function updateFloat(t) {
  const isSphere = layoutMode === 'sphere';
  const isRadial = isSphere || layoutMode === 'helix' || layoutMode === 'oscillons' || layoutMode === 'mobiles';
  const spinAngle = isRadial && autoFly && !figure8Mode ? flyOffset * 0.3 : 0;
  const cosS = Math.cos(spinAngle), sinS = Math.sin(spinAngle);

  instanceGroups.forEach(g => {
    let needsUpdate = false;
    g.data.forEach((d, li) => {
      let px, py, pz;

      if (isRadial) {
        const bx = d.basePos.x, bz = d.basePos.z;
        const rx = bx * cosS - bz * sinS;
        const rz = bx * sinS + bz * cosS;
        if (waveMode) {
          px = rx; py = d.basePos.y; pz = rz;
        } else {
          px = rx + Math.sin(t * d.freq + d.phase) * d.amp * 0.3;
          py = d.basePos.y + Math.cos(t * d.freq * 0.7 + d.phase + 1.0) * d.amp * 0.3;
          pz = rz;
        }
      } else {
        if (waveMode) {
          px = d.basePos.x; py = d.basePos.y; pz = d.basePos.z;
        } else {
          let floatScale = 1;
          if (layoutMode === 'grid') floatScale = 0.15;
          else if (layoutMode === 'schotter') floatScale = 0.1 + (1 - d.basePos.y / 30) * 0.4;
          px = d.basePos.x + Math.sin(t * d.freq + d.phase) * d.amp * floatScale;
          py = d.basePos.y + Math.cos(t * d.freq * 0.7 + d.phase + 1.0) * d.amp * 0.6 * floatScale;
          pz = d.basePos.z;
        }
        if (autoFly && layoutMode !== 'grid' && layoutMode !== 'schotter') {
          pz = ((d.basePos.z + flyOffset) % FLY_DEPTH + FLY_DEPTH) % FLY_DEPTH - FLY_DEPTH / 2;
        }
      }

      // Wave physics displacement
      if (waveMode) {
        const omega = Math.min(flySpeed * 2.0, 6.0);
        const waveK = 0.08;
        const dist = Math.sqrt(d.basePos.x * d.basePos.x + d.basePos.z * d.basePos.z);
        // Standing wave along X
        const standing = Math.sin(waveK * d.basePos.x - omega * t)
                       + Math.sin(waveK * d.basePos.x + omega * t);
        // Radial ripple from center
        const ripple = Math.sin(waveK * dist - omega * t + d.phase);
        // Transverse displacement (Y)
        const waveAmp = d.amp * flySpeed * 1.5;
        py += (standing * 0.4 + ripple * 0.6) * waveAmp;
        // Longitudinal displacement (X/Z)
        const longAmp = waveAmp * 0.2;
        const normX = dist > 0.01 ? d.basePos.x / dist : 0;
        const normZ = dist > 0.01 ? d.basePos.z / dist : 0;
        const longWave = Math.cos(waveK * dist - omega * t + d.phase);
        px += normX * longWave * longAmp;
        pz += normZ * longWave * longAmp;
        // Second harmonic interference
        py += Math.sin(waveK * 2 * dist - omega * 1.5 * t + d.phase * 2) * waveAmp * 0.25;
      }

      const isPinned = pinnedInstance && pinnedInstance.groupIdx === g.mesh.userData.groupIdx && pinnedInstance.instanceId === li;
      const isUnpinning = unpinning && unpinning.groupIdx === g.mesh.userData.groupIdx && unpinning.instanceId === li;

      if (isPinned) {
        // Recompute target each frame so artifact stays centered in front of camera
        camera.getWorldDirection(_tmpVec3A);
        _tmpVec3B.crossVectors(_tmpVec3A, camera.up).normalize();
        _tmpVec3C.copy(camera.position).add(_tmpVec3A.multiplyScalar(12)).add(_tmpVec3B.multiplyScalar(-2));

        // Smooth swoop: lerp from origin to target over ~0.6 seconds
        const elapsed = t - pinnedInstance.pinTime;
        const progress = Math.min(elapsed / 0.6, 1.0);
        // Ease-out cubic for graceful deceleration
        const ease = 1 - Math.pow(1 - progress, 3);

        if (progress >= 1.0) {
          _floatDummy.position.copy(_tmpVec3C);
        } else {
          _floatDummy.position.lerpVectors(pinnedInstance.originPos, _tmpVec3C, ease);
        }
        const baseS = d.baseScale * scaleMul;
        const targetS = d.baseScale * 5.0 * scaleMul;
        const ps = baseS + (targetS - baseS) * ease;

        _floatDummy.scale.set(ps, ps, ps);
        _floatDummy.rotation.set(t * 0.4, t * 0.6, t * 0.2);
        _floatDummy.updateMatrix();
        g.mesh.setMatrixAt(li, _floatDummy.matrix);
        // Store world position for card placement (must clone since _floatDummy.position is reused)
        if (!pinnedInstance.worldPos) pinnedInstance.worldPos = new THREE.Vector3();
        pinnedInstance.worldPos.copy(_floatDummy.position);
        pinnedInstance.settled = progress >= 1.0;
      } else if (isUnpinning) {
        // Graceful return: lerp from pinned position back to natural position
        const elapsed = t - unpinning.unpinTime;
        const progress = Math.min(elapsed / 0.5, 1.0);
        const ease = progress * progress * (3 - 2 * progress); // smoothstep

        const naturalPos = new THREE.Vector3(px, py, pz);
        const currentPos = new THREE.Vector3().lerpVectors(unpinning.startPos, naturalPos, ease);
        const naturalS = d.baseScale * scaleMul;
        const ps = unpinning.startScale + (naturalS - unpinning.startScale) * ease;

        _floatDummy.position.copy(currentPos);
        _floatDummy.scale.set(ps, ps, ps);
        _floatDummy.rotation.set(t * 0.4 * (1 - ease), t * 0.6 * (1 - ease) + t * 0.15 * ease + d.phase * ease, t * 0.2 * (1 - ease));
        _floatDummy.updateMatrix();
        g.mesh.setMatrixAt(li, _floatDummy.matrix);

        if (progress >= 1.0) unpinning = null;
      } else {
        const s = d.baseScale * scaleMul;
        _floatDummy.position.set(px, py, pz);
        _floatDummy.scale.set(s, s, s);
        if (waveMode) {
          const wRot = Math.sin(t * flySpeed + d.phase) * 0.5;
          _floatDummy.rotation.set(wRot, t * 0.15 + d.phase, wRot * 0.3);
        } else {
          _floatDummy.rotation.set(0, t * 0.15 + d.phase, 0);
        }
        _floatDummy.updateMatrix();
        g.mesh.setMatrixAt(li, _floatDummy.matrix);
      }
      needsUpdate = true;
    });
    if (needsUpdate) g.mesh.instanceMatrix.needsUpdate = true;
  });
}

// ─── Fly ───
const keys={};
function onKey(e){
  const t=e.target.tagName;if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA')return;
  // Escape closes any open panel/card (Phase 4b)
  if(e.key==='Escape'){
    e.preventDefault();
    if(document.getElementById('album-card').style.display==='block'){unpinInstance();return}
    const mm=document.getElementById('mobile-menu');
    if(mm&&mm.classList.contains('open')){mm.classList.remove('open');document.getElementById('mobile-menu-btn').setAttribute('aria-expanded','false');return}
    if(document.getElementById('ctrl-panel').classList.contains('open')){document.getElementById('ctrl-panel').classList.remove('open');document.getElementById('ctrl-toggle').setAttribute('aria-expanded','false');return}
    if(document.getElementById('filter-panel').classList.contains('open')){document.getElementById('filter-panel').classList.remove('open');document.getElementById('filter-toggle').setAttribute('aria-expanded','false');return}
    if(document.getElementById('search-results').classList.contains('open')){document.getElementById('search-results').classList.remove('open');document.getElementById('search-input').setAttribute('aria-expanded','false');return}
    return;
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','q','e'].includes(e.key)){e.preventDefault();keys[e.key]=true}
}
function onKeyUp(e){const t=e.target.tagName;if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA')return;keys[e.key]=false}
// Pre-allocated vectors for fly() (Phase 5c)
const _flyFwd = new THREE.Vector3();
const _flyRt = new THREE.Vector3();
const _flyUp = new THREE.Vector3(0, 1, 0);
function fly(){
  if (figure8Mode && autoFly) return;
  const sp=flySpeed;
  camera.getWorldDirection(_flyFwd);_flyFwd.y=0;_flyFwd.normalize();
  _flyRt.crossVectors(_flyFwd,camera.up).normalize();
  if(keys.ArrowUp||keys.w){camera.position.addScaledVector(_flyFwd,sp);controls.target.addScaledVector(_flyFwd,sp)}
  if(keys.ArrowDown||keys.s){camera.position.addScaledVector(_flyFwd,-sp);controls.target.addScaledVector(_flyFwd,-sp)}
  if(keys.ArrowLeft||keys.a){camera.position.addScaledVector(_flyRt,-sp);controls.target.addScaledVector(_flyRt,-sp)}
  if(keys.ArrowRight||keys.d){camera.position.addScaledVector(_flyRt,sp);controls.target.addScaledVector(_flyRt,sp)}
  if(keys.q){camera.position.addScaledVector(_flyUp,sp);controls.target.addScaledVector(_flyUp,sp)}
  if(keys.e){camera.position.addScaledVector(_flyUp,-sp);controls.target.addScaledVector(_flyUp,-sp)}
}

// ─── Click (Album Card + Pin) ───
function unpinInstance() {
  if (pinnedInstance) {
    // Capture current state for graceful return
    const d = instanceGroups[pinnedInstance.groupIdx]?.data[pinnedInstance.instanceId];
    if (d && pinnedInstance.worldPos) {
      unpinning = {
        groupIdx: pinnedInstance.groupIdx,
        instanceId: pinnedInstance.instanceId,
        startPos: pinnedInstance.worldPos.clone(),
        startScale: d.baseScale * 5.0 * scaleMul,
        unpinTime: clock.getElapsedTime(),
      };
    }
  }
  pinnedInstance = null;
  selectedCard = null;
  // Fade card out
  const card = document.getElementById('album-card');
  card.style.transition = 'opacity 0.35s ease';
  card.style.opacity = '0';
  setTimeout(() => {
    card.style.display = 'none';
    card.style.opacity = '';
    card.style.transition = '';
    card.classList.remove('pinned');
  }, 350);
}

function onClick(e) {
  // Ignore clicks on the card itself
  if (e.target.closest('#album-card')) return;

  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(instanceGroups.map(g => g.mesh));
  const card = document.getElementById('album-card');

  if (hits.length) {
    const h = hits[0], gi = h.object.userData.groupIdx;
    const entry = instanceGroups[gi]?.data[h.instanceId];
    if (!entry) { unpinInstance(); return; }

    // If clicking the same pinned artifact, unpin it
    if (pinnedInstance && pinnedInstance.groupIdx === gi && pinnedInstance.instanceId === h.instanceId) {
      unpinInstance();
      return;
    }

    // Pin this artifact — capture current position; target is computed per-frame relative to camera
    selectedCard = entry;
    const originPos = h.point.clone();
    const pinTime = clock.getElapsedTime();
    unpinning = null; // cancel any in-progress return animation
    pinnedInstance = { groupIdx: gi, instanceId: h.instanceId, entry, originPos, pinTime, settled: false };

    const r = entry.row;
    card.querySelector('.ac-name').textContent = r[entry.nameCol] || '';
    const parts = [];
    if (entry.artistCol && r[entry.artistCol]) parts.push(r[entry.artistCol]);
    if (entry.albumCol && r[entry.albumCol]) parts.push(r[entry.albumCol]);
    if (entry.yearCol && r[entry.yearCol]) parts.push(r[entry.yearCol]);
    card.querySelector('.ac-sub').textContent = parts.join(' · ');

    const gc = colorMap[entry.genreCol ? r[entry.genreCol] : ''] || OTHER;
    const ge = card.querySelector('.ac-genre');
    ge.textContent = entry.genreCol ? r[entry.genreCol] : '';
    ge.style.background = gc + '22';
    ge.style.color = gc;

    // Search links
    const artist = (entry.artistCol && r[entry.artistCol]) || '';
    const song = r[entry.nameCol] || '';
    card.querySelector('.ac-yt').href = safeHref(buildYouTubeSearchUrl(song, artist));
    card.querySelector('.ac-spotify').href = safeHref(buildSpotifySearchUrl(song, artist));
    card.querySelector('.ac-apple').href = safeHref(buildAppleMusicSearchUrl(song, artist));
    card.querySelector('.ac-discogs').href = safeHref(buildDiscogsSearchUrl(song, artist));
    card.querySelector('.ac-ebay').href = safeHref(buildEbaySearchUrl(song, artist));

    // Sync heart state
    const heartBtn = card.querySelector('.ac-heart');
    heartBtn.classList.toggle('hearted', isHearted(entry));
    heartBtn.classList.remove('jumping');

    card.classList.add('pinned');
    card.style.display = 'block';
  } else {
    // Click on empty space — unpin
    unpinInstance();
  }
}

// ─── Cursor hint (pointer on hoverable orbs) ───
let _cursorHintPending = false;
function onCursorHint(e) {
  // Skip hover hints for touch input
  if (e.pointerType === 'touch') return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  // Throttle raycasting to once per frame (Phase 5b)
  if (!_cursorHintPending) {
    _cursorHintPending = true;
    requestAnimationFrame(() => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(instanceGroups.map(g => g.mesh));
      renderer.domElement.style.cursor = hits.length ? 'pointer' : '';
      _cursorHintPending = false;
    });
  }
}

// ─── Heart click ───
document.getElementById('album-card').querySelector('.ac-heart').addEventListener('click', (e) => {
  e.stopPropagation();
  if (!selectedCard) return;

  const heartBtn = e.currentTarget;
  const entry = selectedCard;
  const key = getArtifactKey(entry);
  const r = entry.row;

  if (isHearted(entry)) {
    artifactArchive = artifactArchive.filter(a => a.key !== key);
    heartBtn.classList.remove('hearted');
  } else {
    const artifact = {
      key,
      name: r[entry.nameCol] || '',
      artist: (entry.artistCol && r[entry.artistCol]) || '',
      album: (entry.albumCol && r[entry.albumCol]) || '',
      genre: (entry.genreCol && r[entry.genreCol]) || '',
      year: (entry.yearCol && r[entry.yearCol]) || '',
      heartedAt: new Date().toISOString(),
    };
    artifactArchive.push(artifact);
    heartBtn.classList.add('hearted');

    // Jump animation
    heartBtn.classList.add('jumping');
    setTimeout(() => heartBtn.classList.remove('jumping'), 600);

    // Swoop animation
    const nameEl = document.querySelector('#album-card .ac-name');
    const nameRect = nameEl.getBoundingClientRect();
    createSwoopAnimation(artifact.name, nameRect);
  }

  saveArtifactArchive();
});

document.getElementById('ab-export').addEventListener('click', () => {
  if (!artifactArchive.length) return;
  const exportData = {
    format: 'artifact-archive-v1',
    exportedAt: new Date().toISOString(),
    count: artifactArchive.length,
    artifacts: artifactArchive.map(a => ({
      name: a.name, artist: a.artist, album: a.album,
      genre: a.genre, year: a.year, heartedAt: a.heartedAt,
    }))
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'artifact-archive-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

// ─── Animate ───
function animate(){
  if (!isPageVisible) return;
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Accumulate fly offset
  if (autoFly) {
    flyOffset += flySpeed * 0.02;
  }

  fly();

  // Figure-8 camera path (lemniscate of Bernoulli)
  if (figure8Mode && autoFly) {
    const theta = flyOffset * 0.15;
    const sinT = Math.sin(theta), cosT = Math.cos(theta);
    const denom = 1 + sinT * sinT;
    const radius = layoutMode === 'sphere' ? 160 : 80;
    const depth = layoutMode === 'sphere' ? 160 : 90;
    const yAmp = layoutMode === 'sphere' ? 40 : 15;
    const yBase = layoutMode === 'sphere' ? 20 : 10;
    // Path point on the lemniscate
    const pathX = radius * cosT / denom;
    const pathY = yAmp * sinT * cosT / denom + yBase;
    const pathZ = depth * sinT;
    // Look-ahead point
    const lt = theta + 0.15;
    const sinL = Math.sin(lt), cosL = Math.cos(lt);
    const denomL = 1 + sinL * sinL;
    const lookX = radius * cosL / denomL;
    const lookY = yAmp * sinL * cosL / denomL + yBase;
    const lookZ = depth * sinL;
    // Preserve user zoom: maintain distance between camera and target
    const currentDist = camera.position.distanceTo(controls.target);
    const pathTarget = new THREE.Vector3(lookX, lookY, lookZ);
    const pathDir = new THREE.Vector3(lookX - pathX, lookY - pathY, lookZ - pathZ).normalize();
    const pathOrigin = pathTarget.clone().sub(pathDir.multiplyScalar(currentDist));
    camera.position.lerp(pathOrigin, 0.03);
    controls.target.lerp(pathTarget, 0.03);
  }

  updateFloat(t);

  // Keep pinned card next to pinned artifact on screen
  if (pinnedInstance && pinnedInstance.worldPos) {
    const card = document.getElementById('album-card');
    // Fade card in after swoop completes
    const elapsed = t - pinnedInstance.pinTime;
    const cardFade = Math.min(Math.max((elapsed - 0.3) / 0.3, 0), 1);
    card.style.opacity = cardFade;

    if (isMobile()) {
      // Mobile: bottom sheet position (CSS handles layout)
      card.style.left = '';
      card.style.top = '';
      card.style.bottom = '';
    } else {
      // Desktop: floating near the 3D object
      const projected = pinnedInstance.worldPos.clone().project(camera);
      const sx = (projected.x * 0.5 + 0.5) * innerWidth;
      const sy = (-projected.y * 0.5 + 0.5) * innerHeight;
      card.style.left = Math.min(Math.max(sx + 80, 10), innerWidth - 400) + 'px';
      card.style.top = Math.min(Math.max(sy - 80, 10), innerHeight - 200) + 'px';
      card.style.bottom = 'auto';
    }
  }

  // Rotate labels with radial layouts
  const isRadialLayout = layoutMode === 'sphere' || layoutMode === 'helix' || layoutMode === 'oscillons' || layoutMode === 'mobiles';
  if (isRadialLayout && autoFly && !figure8Mode) {
    const spin = flyOffset * 0.3;
    const cs = Math.cos(spin), ss = Math.sin(spin);
    labelSprites.forEach(s => {
      if (s.userData.baseX === undefined) { s.userData.baseX = s.position.x; s.userData.baseZ = s.position.z; }
      s.position.x = s.userData.baseX * cs - s.userData.baseZ * ss;
      s.position.z = s.userData.baseX * ss + s.userData.baseZ * cs;
    });
  }

  controls.update();
  composer.render();
}

function loadData(text) {
  const { headers: h, rows: r } = isXML(text) ? parseXML(text) : parseCSV(text);
  if (!r.length) return;

  headers = h;

  activeFilters = {};

function handleFile(f) {
  const status = document.getElementById('upload-status');
  const bar = document.getElementById('upload-progress');
  const fill = document.getElementById('upload-progress-fill');
  const fileInput = document.getElementById('file-input');

  function setProgress(pct) {
    bar.style.display = 'block';
    fill.style.width = Math.min(100, Math.round(pct)) + '%';
  }
  function hideProgress() {
    setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 600);
  }
  function showError(msg) {
    status.style.display = 'block';
    status.textContent = `/// ${msg} ///`;
    hideProgress();
    setTimeout(() => { status.style.display = 'none'; }, 5000);
  }

  const error = validateFile(f);
  if (error) { showError(error); return; }

  status.style.display = 'block';
  status.textContent = `/// Reading ${(f.size / 1048576).toFixed(1)} MB... ///`;
  setProgress(0);

  const rd = new FileReader();
  rd.onprogress = e => { if (e.lengthComputable) setProgress((e.loaded / e.total) * 50); };
  rd.onerror = () => { showError('Failed to read file'); };
  rd.onload = e => {
    const text = e.target.result;
    fileInput.value = ''; // allow re-uploading the same file

    if (isXML(text)) {
      // XML: must use main thread (DOMParser unavailable in workers)
      status.textContent = '/// Parsing XML... ///';
      setProgress(55);
      setTimeout(() => {
        try {
          const { headers: h, rows: r } = parseXML(text);
          if (!r.length) { showError('No records found in XML'); return; }
          setProgress(90);
          totalRows = r.length;
          headers = h;
          masterData = sample(r);
          activeFilters = {}; activeSortCol = null; activeSortDir = 'asc';
          populateFilterPanel(h, masterData);
          rebuildViz();
          setProgress(100);
          status.textContent = `/// ${totalRows.toLocaleString()} tracks loaded ///`;
          hideProgress();
          setTimeout(() => { status.style.display = 'none'; }, 3000);
        } catch (err) { showError(err.message); }
      }, 30);
    } else {
      // CSV: offload to Web Worker
      status.textContent = '/// Parsing CSV... ///';
      setProgress(50);
      const worker = new Worker(_workerUrl);
      const timeout = setTimeout(() => {
        worker.terminate();
        showError('Parsing timed out (>60s)');
      }, 60000);

      worker.onmessage = ev => {
        const msg = ev.data;
        if (msg.type === 'progress') {
          setProgress(msg.pct);
        } else if (msg.type === 'done') {
          clearTimeout(timeout);
          if (!msg.rows.length) { showError('No rows found in CSV'); worker.terminate(); return; }
          totalRows = msg.totalRows;
          setProgress(90);
          headers = msg.headers;
          masterData = msg.rows;
          activeFilters = {}; activeSortCol = null; activeSortDir = 'asc';
          populateFilterPanel(headers, masterData);
          rebuildViz();
          setProgress(100);
          status.textContent = `/// ${totalRows.toLocaleString()} tracks loaded ///`;
          hideProgress();
          setTimeout(() => { status.style.display = 'none'; }, 3000);
          worker.terminate();
        } else if (msg.type === 'error') {
          clearTimeout(timeout);
          showError(msg.message);
          worker.terminate();
        }
      };
      worker.onerror = () => {
        clearTimeout(timeout);
        showError('CSV parser crashed');
        worker.terminate();
      };
      worker.postMessage(text);
    }
  };
  rd.readAsText(f);
}

// Auto-load default library on startup (with download progress)
async function loadDefaultLibrary() {
  const loadEl = document.getElementById('loading');
  try {
    const resp = await fetch('music_library.csv');
    if (!resp.ok) throw new Error('fetch failed');
    const contentLength = resp.headers.get('Content-Length');
    let text;
    if (contentLength && resp.body) {
      const total = parseInt(contentLength, 10);
      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        const pct = Math.round((received / total) * 100);
        loadEl.textContent = `/// Loading library ${pct}% ///`;
      }
      const buf = new Uint8Array(received);
      let pos = 0;
      for (const chunk of chunks) { buf.set(chunk, pos); pos += chunk.length; }
      text = new TextDecoder().decode(buf);
    } else {
      // Fallback: no Content-Length (e.g. local file:// or gzipped)
      text = await resp.text();
    }
    loadData(text);
    loadEl.classList.add('hidden');
  } catch {
    loadEl.textContent = '/// Error loading library ///';
  }
}

    return;
  }
  build(headers, csvData);

}
